<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PARANTÈZ VOL.1 — Accès Exclusif</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #222222;
      --accent: #C8FF00;
      --accent-dim: rgba(200,255,0,0.12);
      --text: #EFEFEF;
      --muted: #555555;
      --error: #FF4444;
      --success: #C8FF00;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Glow background */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,255,0,0.04) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .gate-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 2rem;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .brand {
      text-align: center;
      margin-bottom: 3rem;
    }

    .brand-logo {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 12vw, 6rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--text);
      position: relative;
      display: inline-block;
    }

    .brand-logo span {
      color: var(--accent);
    }

    .brand-vol {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* Card */
    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem 2rem;
      position: relative;
    }

    .gate-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px;
      height: 3px;
      background: var(--accent);
    }

    .gate-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .gate-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .gate-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    /* Input group */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .code-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 1rem 1.25rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--accent);
    }

    .code-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.15em;
      font-size: 0.85rem;
    }

    .code-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .code-input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 2px rgba(255,68,68,0.1);
      animation: shake 0.4s ease;
    }

    .code-input.success {
      border-color: var(--success);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .btn-access {
      width: 100%;
      background: var(--accent);
      color: #080808;
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      border: none;
      padding: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn-access:hover:not(:disabled) { opacity: 0.88; }
    .btn-access:active:not(:disabled) { transform: scale(0.99); }
    .btn-access:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading spinner inside button */
    .btn-access.loading::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border: 2px solid #080808;
      border-top-color: transparent;
      border-radius: 50%;
      right: 1.25rem; top: 50%;
      transform: translateY(-50%);
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    /* Status message */
    .status-msg {
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      min-height: 1rem;
      transition: opacity 0.2s;
    }
    .status-msg.error   { color: var(--error); }
    .status-msg.success { color: var(--success); }
    .status-msg.hidden  { opacity: 0; }

    /* Success overlay */
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1rem;
      padding: 1rem 0;
    }

    .success-overlay.visible { display: flex; }

    .success-icon {
      font-size: 2.5rem;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 0.08em;
    }

    .success-sub {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .redirect-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .redirect-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 2.5s linear;
    }

    /* Footer */
    .gate-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>

  <div class="gate-wrapper">
    <div class="brand">
      <div class="brand-logo">PARAN<span>È</span>Z</div>
      <div class="brand-vol">VOL. 1 — OPAK MNG</div>
    </div>

    <div class="gate-card">
      <div class="gate-label">Accès exclusif</div>
      <div class="gate-title">CODE D'INVITATION</div>
      <p class="gate-desc">
        Cette mixtape est distribuée en accès limité.<br>
        Entre ton code pour accéder aux sons.
      </p>

      <!-- Form state -->
      <div id="form-state">
        <div class="input-group">
          <input
            class="code-input"
            id="codeInput"
            type="text"
            placeholder="XXXX-XXXX"
            maxlength="20"
            autocomplete="off"
            spellcheck="false"
          />
          <p class="status-msg hidden" id="statusMsg"></p>
        </div>
        <button class="btn-access" id="accessBtn" onclick="verifyCode()">
          ACCÉDER
        </button>
      </div>

      <!-- Success state -->
      <div class="success-overlay" id="successState">
        <div class="success-icon">✦</div>
        <div class="success-title">ACCÈS ACCORDÉ</div>
        <div class="success-sub">Redirection en cours…</div>
        <div class="redirect-bar">
          <div class="redirect-bar-fill" id="redirectBar"></div>
        </div>
      </div>
    </div>

    <div class="gate-footer">© 2026 OPAK MNG — TOUS DROITS RÉSERVÉS</div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    // ==========================================
    // ⚙️ CONFIGURATION — À modifier
    // ==========================================
    const SUPABASE_URL  = 'https://aceaaehdelrrkxbpfxzp.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjZWFhZWhkZWxycmt4YnBmeHpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzEwMTQsImV4cCI6MjA5NDMwNzAxNH0.I95UrlcB6Yr_Nhg4jTf-R4bnNfmo4ClqZBE1vVITCfQ';
    const REDIRECT_URL  = '/';                      // URL de la mixtape après accès
    const SESSION_KEY   = 'pz_access_granted';
    // ==========================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const input    = document.getElementById('codeInput');
    const btn      = document.getElementById('accessBtn');
    const statusEl = document.getElementById('statusMsg');

    // Si déjà authentifié → redirect direct
    if (sessionStorage.getItem(SESSION_KEY)) {
      window.location.href = REDIRECT_URL;
    }

    // Formatage auto du code en majuscules
    input.addEventListener('input', () => {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      clearStatus();
    });

    // Entrée clavier
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyCode();
    });

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = `status-msg ${type}`;
    }

    function clearStatus() {
      statusEl.textContent = '';
      statusEl.className = 'status-msg hidden';
      input.classList.remove('error', 'success');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
      btn.textContent = loading ? 'VÉRIFICATION…' : 'ACCÉDER';
      if (loading) btn.classList.add('loading');
    }

    async function verifyCode() {
      const code = input.value.trim();

      if (!code) {
        setStatus('Entre ton code d\'invitation.', 'error');
        input.classList.add('error');
        return;
      }

      setLoading(true);

      try {
        // 1. Chercher le code dans Supabase
        const { data, error } = await supabase
          .from('invite_codes')
          .select('id, code, is_active, used_at')
          .eq('code', code)
          .eq('is_active', true)
          .single();

        if (error || !data) {
          // Code introuvable ou inactif
          input.classList.add('error');
          setStatus('Code invalide ou déjà utilisé.', 'error');
          setLoading(false);
          return;
        }

        // 2. Marquer le code comme utilisé
        await supabase
          .from('invite_codes')
          .update({
            used_at: new Date().toISOString(),
            is_active: false  // usage unique — retirer cette ligne pour usage multiple
          })
          .eq('id', data.id);

        // 3. Stocker l'accès en session
        sessionStorage.setItem(SESSION_KEY, '1');
        sessionStorage.setItem('pz_code_used', code);

        // 4. Afficher succès + rediriger
        input.classList.add('success');
        document.getElementById('form-state').style.display = 'none';
        const successEl = document.getElementById('successState');
        successEl.classList.add('visible');

        // Lancer la barre de progression
        setTimeout(() => {
          document.getElementById('redirectBar').style.width = '100%';
        }, 50);

        // Rediriger après 2.8s
        setTimeout(() => {
          window.location.href = REDIRECT_URL;
        }, 2800);

      } catch (err) {
        console.error(err);
        setStatus('Erreur réseau. Réessaie.', 'error');
        setLoading(false);
      }
    }
  </script>

</body>
</html>
